
openapi: 3.0.3
info:
  title: Cliltutors API
  version: 1.0.0
  description: API para el ecosistema de Cliltutors
paths:
  /api/admin/create-instructor/:
    post:
      operationId: admin_create_instructor_create
      description: Endpoint exclusivo para que administradores creen nuevos instructores.
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstructorRegistration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InstructorRegistration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InstructorRegistration'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructorRegistration'
          description: ''
  /api/courses/:
    get:
      operationId: courses_list
      description: ViewSet para listar cursos (público) y crearlos (solo admin).
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - courses
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCourseList'
          description: ''
    post:
      operationId: courses_create
      description: ViewSet para listar cursos (público) y crearlos (solo admin).
      tags:
      - courses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Course'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Course'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Course'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
          description: ''
  /api/courses/{id}/:
    get:
      operationId: courses_retrieve
      description: ViewSet para listar cursos (público) y crearlos (solo admin).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Curso.
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
          description: ''
    put:
      operationId: courses_update
      description: ViewSet para listar cursos (público) y crearlos (solo admin).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Curso.
        required: true
      tags:
      - courses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Course'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Course'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Course'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
          description: ''
    patch:
      operationId: courses_partial_update
      description: ViewSet para listar cursos (público) y crearlos (solo admin).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Curso.
        required: true
      tags:
      - courses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCourse'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCourse'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCourse'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
          description: ''
    delete:
      operationId: courses_destroy
      description: ViewSet para listar cursos (público) y crearlos (solo admin).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Curso.
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/courses/purchase/{course_id}/:
    post:
      operationId: courses_purchase_create
      parameters:
      - in: path
        name: course_id
        schema:
          type: integer
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/instructors/:
    get:
      operationId: instructors_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - instructors
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInstructorList'
          description: ''
  /api/instructors/{id}/:
    get:
      operationId: instructors_retrieve
      description: Endpoint para obtener el detalle de un instructor específico por
        su ID.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - instructors
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instructor'
          description: ''
  /api/login/:
    post:
      operationId: login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTokenObtainPair'
          description: ''
  /api/register/:
    post:
      operationId: register_create
      description: Vista para registro de nuevos usuarios
      tags:
      - register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistration'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistration'
          description: ''
  /api/sessions/:
    get:
      operationId: sessions_retrieve
      parameters:
      - in: query
        name: date_from
        schema:
          type: string
          format: date
      - in: query
        name: date_to
        schema:
          type: string
          format: date
      - in: query
        name: instructor_id
        schema:
          type: integer
      - in: query
        name: language
        schema:
          type: string
      - in: query
        name: level
        schema:
          type: string
      - in: query
        name: page
        schema:
          type: integer
      - in: query
        name: page_size
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
      - in: query
        name: type
        schema:
          type: string
      tags:
      - sessions
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/sessions/{id}/:
    get:
      operationId: sessions_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - sessions
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
          description: ''
  /api/students/:
    get:
      operationId: students_list
      description: |-
        Lista todos los usuarios que tienen el rol de 'estudiante',
        siempre que el usuario que consulta sea 'profesor'.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - students
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserList'
          description: ''
components:
  schemas:
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
          nullable: true
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        level:
          type: string
          nullable: true
          maxLength: 50
        is_published:
          type: boolean
        total_lessons:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - title
      - total_lessons
    EmailTokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    Instructor:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          maxLength: 50
        first_name:
          type: string
          nullable: true
          maxLength: 100
        last_name:
          type: string
          nullable: true
          maxLength: 100
        email:
          type: string
          maxLength: 100
        profile:
          allOf:
          - $ref: '#/components/schemas/InstructorProfile'
          readOnly: true
          nullable: true
      required:
      - email
      - id
      - profile
      - username
    InstructorProfile:
      type: object
      properties:
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        bio:
          description: '{"en": "...", "es": "...", "pt": "..."}'
        languages:
          type: array
          items:
            type: string
            maxLength: 50
        specialties:
          type: array
          items:
            type: string
            maxLength: 100
        rating:
          type: number
          format: double
        review_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        country:
          type: string
          description: ISO Country Code
          maxLength: 2
        timezone:
          type: string
          maxLength: 100
        hourly_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        session_duration:
          allOf:
          - $ref: '#/components/schemas/SessionDurationEnum'
          minimum: -2147483648
          maximum: 2147483647
        is_active:
          type: boolean
      required:
      - country
      - hourly_rate
    InstructorRegistration:
      type: object
      properties:
        username:
          type: string
          maxLength: 50
        email:
          type: string
          maxLength: 100
        password:
          type: string
          writeOnly: true
          minLength: 8
        first_name:
          type: string
          nullable: true
          maxLength: 100
        last_name:
          type: string
          nullable: true
          maxLength: 100
        avatar_url:
          type: string
          format: uri
        bio: {}
        languages:
          type: array
          items:
            type: string
        specialties:
          type: array
          items:
            type: string
        country:
          type: string
          maxLength: 2
        timezone:
          type: string
          maxLength: 100
        hourly_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        session_duration:
          type: integer
          default: 50
      required:
      - country
      - email
      - hourly_rate
      - password
      - timezone
      - username
    PaginatedCourseList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Course'
    PaginatedInstructorList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Instructor'
    PaginatedUserList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/User'
    PatchedCourse:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
          nullable: true
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        level:
          type: string
          nullable: true
          maxLength: 50
        is_published:
          type: boolean
        total_lessons:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    Session:
      type: object
      properties:
        id:
          type: string
        instructor:
          $ref: '#/components/schemas/SessionInstructor'
        title:
          type: object
          additionalProperties: {}
        description:
          type: object
          additionalProperties: {}
        date:
          type: string
          format: date
        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time
        duration_minutes:
          type: integer
        type:
          type: string
        language:
          type: string
        level:
          type: string
        max_participants:
          type: integer
        enrolled_count:
          type: integer
        spots_left:
          type: integer
        price:
          type: string
        status:
          type: string
        tags:
          type: array
          items:
            type: string
        is_booked_by_current_user:
          type: boolean
      required:
      - date
      - description
      - duration_minutes
      - end_time
      - enrolled_count
      - id
      - instructor
      - is_booked_by_current_user
      - language
      - level
      - max_participants
      - price
      - spots_left
      - start_time
      - status
      - tags
      - title
      - type
    SessionDurationEnum:
      enum:
      - 30
      - 60
      type: integer
      description: |-
        * `30` - 30 minutes
        * `60` - 60 minutes
    SessionInstructor:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        avatar_url:
          type: string
        rating:
          type: number
          format: double
      required:
      - avatar_url
      - id
      - name
      - rating
    User:
      type: object
      description: Serializer para mostrar información del usuario
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          maxLength: 50
        email:
          type: string
          maxLength: 100
        first_name:
          type: string
          nullable: true
          maxLength: 100
        last_name:
          type: string
          nullable: true
          maxLength: 100
        full_name:
          type: string
          readOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - date_joined
      - email
      - full_name
      - id
      - last_login
      - username
    UserRegistration:
      type: object
      description: Serializer para registro de nuevos usuarios
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          maxLength: 50
        email:
          type: string
          maxLength: 100
        password:
          type: string
          writeOnly: true
          minLength: 8
        password_confirm:
          type: string
          writeOnly: true
        first_name:
          type: string
          nullable: true
          maxLength: 100
        last_name:
          type: string
          nullable: true
          maxLength: 100
      required:
      - email
      - id
      - password
      - password_confirm
      - username
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
